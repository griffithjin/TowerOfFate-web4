<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>命运塔·对战 | Tower of Fate</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        :root {
            --gold: #ffd700;
            --gold-dark: #b8860b;
            --orange: #ff6b00;
            --bg-dark: #0a0a0f;
            --bg-secondary: #1a1a2e;
            --bg-tertiary: #16213e;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --danger: #ff4444;
            --success: #00ff88;
            --info: #00aaff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* Game Container */
        #game-container {
            display: grid;
            grid-template-areas:
                "header header header"
                "left tower right"
                "left hand right"
                "controls controls controls";
            grid-template-columns: 60px 1fr 80px;
            grid-template-rows: auto 1fr 120px auto;
            height: 100vh;
            height: 100dvh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* Header - Player Info & Countdown */
        #game-header {
            grid-area: header;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            z-index: 100;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--orange));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border: 2px solid rgba(255, 215, 0, 0.5);
        }

        .player-details {
            display: flex;
            flex-direction: column;
        }

        .player-name {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--gold);
        }

        .player-rank {
            font-size: 0.65rem;
            color: var(--text-secondary);
        }

        .game-timer {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 12px;
            padding: 6px 16px;
        }

        .timer-label {
            font-size: 0.6rem;
            color: var(--danger);
            text-transform: uppercase;
        }

        .timer-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--danger);
            font-family: 'Courier New', monospace;
        }

        .opponent-info {
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0.8;
        }

        .opponent-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #666, #333);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .opponent-details {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .opponent-name {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .opponent-status {
            font-size: 0.6rem;
            color: var(--success);
        }

        /* Left Panel - Chat & Items */
        #left-panel {
            grid-area: left;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 8px 4px;
            gap: 8px;
        }

        .panel-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: var(--gold);
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .panel-btn:active {
            transform: scale(0.95);
            background: rgba(255, 215, 0, 0.2);
        }

        .panel-btn .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--danger);
            color: white;
            font-size: 0.6rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 3D Tower Area */
        #tower-3d {
            grid-area: tower;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
            overflow: hidden;
        }

        .tower-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .tower-level {
            width: 180px;
            height: 50px;
            background: linear-gradient(180deg, rgba(255, 215, 0, 0.2), rgba(255, 107, 0, 0.1));
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 8px;
            margin: 4px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: var(--gold);
            transform-style: preserve-3d;
            transition: all 0.3s;
            position: relative;
        }

        .tower-level.active {
            background: linear-gradient(180deg, rgba(255, 215, 0, 0.4), rgba(255, 107, 0, 0.2));
            border-color: var(--gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .tower-level.completed {
            background: rgba(0, 255, 136, 0.2);
            border-color: var(--success);
        }

        .tower-level-number {
            position: absolute;
            left: 10px;
            font-size: 0.7rem;
            opacity: 0.7;
        }

        .tower-level-guard {
            font-size: 1.2rem;
        }

        .current-level-indicator {
            position: absolute;
            right: -30px;
            width: 24px;
            height: 24px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #000;
            animation: pulse-gold 1.5s infinite;
        }

        @keyframes pulse-gold {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(255, 215, 0, 0); }
        }

        .tower-floors {
            position: absolute;
            bottom: 20px;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
        }

        /* Right Panel - Guard Cards & Taunt */
        #right-panel {
            grid-area: right;
            display: flex;
            flex-direction: column;
            padding: 8px 4px;
            gap: 8px;
        }

        .guard-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .guard-area-title {
            font-size: 0.6rem;
            color: var(--text-secondary);
            text-align: center;
            text-transform: uppercase;
        }

        .guard-card {
            width: 100%;
            aspect-ratio: 3/4;
            background: linear-gradient(135deg, rgba(255, 0, 0, 0.2), rgba(139, 0, 0, 0.1));
            border: 1px solid rgba(255, 0, 0, 0.4);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }

        .guard-card:active {
            transform: scale(0.95);
        }

        .guard-card.empty {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .guard-card-value {
            font-size: 0.7rem;
            color: var(--danger);
            margin-top: 4px;
        }

        .taunt-card {
            margin-top: auto;
            background: linear-gradient(135deg, rgba(255, 107, 0, 0.3), rgba(255, 0, 0, 0.2));
            border: 2px solid var(--orange);
        }

        .taunt-card .taunt-label {
            font-size: 0.55rem;
            color: var(--orange);
            text-transform: uppercase;
        }

        /* Hand Area */
        #hand-area {
            grid-area: hand;
            display: flex;
            flex-direction: column;
            padding: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 215, 0, 0.2);
        }

        .hand-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .hand-title {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .hand-count {
            font-size: 0.7rem;
            color: var(--gold);
            background: rgba(255, 215, 0, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
        }

        .hand-scroll {
            flex: 1;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 4px;
            scrollbar-width: none;
            -ms-overflow-style: none;
            scroll-snap-type: x mandatory;
        }

        .hand-scroll::-webkit-scrollbar {
            display: none;
        }

        .hand-card {
            min-width: 60px;
            max-width: 60px;
            height: 90px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 107, 0, 0.1));
            border: 1px solid rgba(255, 215, 0, 0.4);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            scroll-snap-align: start;
            position: relative;
        }

        .hand-card:active {
            transform: translateY(-5px) scale(1.05);
        }

        .hand-card.selected {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.4), rgba(255, 107, 0, 0.3));
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            transform: translateY(-10px);
        }

        .hand-card-suit {
            font-size: 1.2rem;
        }

        .hand-card-value {
            font-size: 0.75rem;
            color: var(--gold);
            font-weight: bold;
        }

        .hand-card.joker {
            background: linear-gradient(135deg, rgba(255, 0, 255, 0.2), rgba(0, 255, 255, 0.1));
            border-color: #ff00ff;
        }

        /* Controls */
        #controls {
            grid-area: controls;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(10, 10, 15, 0.98);
            border-top: 1px solid rgba(255, 215, 0, 0.2);
            gap: 12px;
        }

        .control-group {
            display: flex;
            gap: 8px;
        }

        .control-btn {
            min-width: 44px;
            height: 44px;
            border-radius: 12px;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .control-btn-icon {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .control-btn-primary {
            flex: 1;
            max-width: 150px;
            background: linear-gradient(45deg, var(--gold), var(--orange));
            color: #000;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .control-btn-danger {
            background: rgba(255, 0, 0, 0.2);
            color: var(--danger);
            border: 1px solid rgba(255, 0, 0, 0.4);
        }

        /* Connection Status */
        .connection-status {
            position: fixed;
            top: env(safe-area-inset-top, 0);
            left: 50%;
            transform: translateX(-50%);
            padding: 4px 12px;
            border-radius: 0 0 12px 12px;
            font-size: 0.65rem;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }

        .connection-status.connected {
            background: rgba(0, 255, 136, 0.2);
            color: var(--success);
        }

        .connection-status.disconnected {
            background: rgba(255, 0, 0, 0.2);
            color: var(--danger);
        }

        .connection-status.connecting {
            background: rgba(255, 215, 0, 0.2);
            color: var(--gold);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        .connected .status-dot {
            background: var(--success);
            animation: none;
        }

        .disconnected .status-dot {
            background: var(--danger);
        }

        .connecting .status-dot {
            background: var(--gold);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Modals */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-tertiary));
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 320px;
            animation: modalIn 0.3s ease-out;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-title {
            font-size: 1.1rem;
            color: var(--gold);
            margin-bottom: 16px;
            text-align: center;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-btn:active {
            transform: scale(0.98);
        }

        .modal-btn-primary {
            background: linear-gradient(45deg, var(--gold), var(--orange));
            color: #000;
        }

        .modal-btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Chat Panel */
        .chat-panel {
            position: fixed;
            left: 0;
            top: 60px;
            bottom: 180px;
            width: 280px;
            background: rgba(10, 10, 15, 0.98);
            border-right: 1px solid rgba(255, 215, 0, 0.2);
            transform: translateX(-100%);
            transition: transform 0.3s ease-out;
            z-index: 500;
            display: flex;
            flex-direction: column;
        }

        .chat-panel.show {
            transform: translateX(0);
        }

        .chat-header {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-message {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            font-size: 0.8rem;
        }

        .chat-message.system {
            background: rgba(255, 215, 0, 0.1);
            color: var(--gold);
        }

        .chat-input-area {
            padding: 12px;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            padding: 10px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .chat-send {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--gold), var(--orange));
            border: none;
            color: #000;
            font-size: 1rem;
            cursor: pointer;
        }

        /* Items Panel */
        .items-panel {
            position: fixed;
            left: 60px;
            bottom: 180px;
            width: 200px;
            background: rgba(10, 10, 15, 0.98);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 16px;
            padding: 16px;
            transform: scale(0);
            transform-origin: bottom left;
            transition: transform 0.2s ease-out;
            z-index: 500;
        }

        .items-panel.show {
            transform: scale(1);
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .item-btn {
            aspect-ratio: 1;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .item-btn span {
            font-size: 0.55rem;
            color: var(--text-secondary);
        }

        /* Animations */
        .card-play-animation {
            position: fixed;
            pointer-events: none;
            z-index: 1500;
            transition: all 0.5s ease-out;
        }

        .damage-popup {
            position: absolute;
            color: var(--danger);
            font-size: 1.5rem;
            font-weight: bold;
            animation: damageFloat 1s ease-out forwards;
            pointer-events: none;
        }

        @keyframes damageFloat {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.5); }
        }

        /* Responsive */
        @media (min-width: 768px) {
            #game-container {
                grid-template-columns: 80px 1fr 100px;
                grid-template-rows: auto 1fr 140px auto;
            }

            .hand-card {
                min-width: 70px;
                max-width: 70px;
                height: 105px;
            }

            .tower-level {
                width: 220px;
                height: 60px;
            }
        }

        @media (min-width: 1024px) {
            #game-container {
                grid-template-columns: 100px 1fr 120px;
            }

            .hand-card {
                min-width: 80px;
                max-width: 80px;
                height: 120px;
            }
        }
    </style>
</head>
<body>
    <!-- Connection Status -->
    <div id="connection-status" class="connection-status connecting">
        <span class="status-dot"></span>
        <span class="status-text">连接中...</span>
    </div>

    <!-- Game Container -->
    <div id="game-container">
        <!-- Header -->
        <header id="game-header">
            <div class="player-info">
                <div class="player-avatar">👤</div>
                <div class="player-details">
                    <span class="player-name">玩家名称</span>
                    <span class="player-rank">🏆 黄金守卫</span>
                </div>
            </div>
            <div class="game-timer">
                <span class="timer-label">回合倒计时</span>
                <span class="timer-value" id="timer">30</span>
            </div>
            <div class="opponent-info">
                <div class="opponent-details">
                    <span class="opponent-name">对手名称</span>
                    <span class="opponent-status">● 在线</span>
                </div>
                <div class="opponent-avatar">👥</div>
            </div>
        </header>

        <!-- Left Panel -->
        <aside id="left-panel">
            <button class="panel-btn" id="chat-btn" title="聊天">
                💬
                <span class="badge">3</span>
            </button>
            <button class="panel-btn" id="items-btn" title="道具">
                🎒
            </button>
        </aside>

        <!-- 3D Tower -->
        <main id="tower-3d">
            <div class="tower-container">
                <div class="tower-floors">
                    <div class="tower-level completed">
                        <span class="tower-level-number">10</span>
                        <span class="tower-level-guard">🛡️</span>
                    </div>
                    <div class="tower-level completed">
                        <span class="tower-level-number">9</span>
                        <span class="tower-level-guard">⚔️</span>
                    </div>
                    <div class="tower-level completed">
                        <span class="tower-level-number">8</span>
                        <span class="tower-level-guard">🗡️</span>
                    </div>
                    <div class="tower-level active">
                        <span class="tower-level-number">7</span>
                        <span class="tower-level-guard">👹</span>
                        <div class="current-level-indicator">👤</div>
                    </div>
                    <div class="tower-level">
                        <span class="tower-level-number">6</span>
                        <span class="tower-level-guard">❓</span>
                    </div>
                    <div class="tower-level">
                        <span class="tower-level-number">5</span>
                        <span class="tower-level-guard">❓</span>
                    </div>
                </div>
            </div>
        </main>

        <!-- Right Panel -->
        <aside id="right-panel">
            <div class="guard-area">
                <span class="guard-area-title">守卫牌</span>
                <div class="guard-card">
                    <span>🛡️</span>
                    <span class="guard-card-value">K♠</span>
                </div>
                <div class="guard-card">
                    <span>⚔️</span>
                    <span class="guard-card-value">Q♥</span>
                </div>
                <div class="guard-card empty">
                    <span>➕</span>
                </div>
            </div>
            <div class="guard-card taunt-card">
                <span class="taunt-label">激怒</span>
                <span>🔥</span>
            </div>
        </aside>

        <!-- Hand Area -->
        <section id="hand-area">
            <div class="hand-header">
                <span class="hand-title">手牌</span>
                <span class="hand-count">13张</span>
            </div>
            <div class="hand-scroll" id="hand-scroll">
                <div class="hand-card">
                    <span class="hand-card-suit">♠</span>
                    <span class="hand-card-value">A</span>
                </div>
                <div class="hand-card">
                    <span class="hand-card-suit">♥</span>
                    <span class="hand-card-value">K</span>
                </div>
                <div class="hand-card">
                    <span class="hand-card-suit">♦</span>
                    <span class="hand-card-value">Q</span>
                </div>
                <div class="hand-card">
                    <span class="hand-card-suit">♣</span>
                    <span class="hand-card-value">J</span>
                </div>
                <div class="hand-card">
                    <span class="hand-card-suit">♠</span>
                    <span class="hand-card-value">10</span>
                </div>
                <div class="hand-card">
                    <span class="hand-card-suit">♥</span>
                    <span class="hand-card-value">9</span>
                </div>
                <div class="hand-card">
                    <span class="hand-card-suit">♦</span>
                    <span class="hand-card-value">8</span>
                </div>
                <div class="hand-card">
                    <span class="hand-card-suit">♣</span>
                    <span class="hand-card-value">7</span>
                </div>
                <div class="hand-card">
                    <span class="hand-card-suit">♠</span>
                    <span class="hand-card-value">6</span>
                </div>
                <div class="hand-card">
                    <span class="hand-card-suit">♥</span>
                    <span class="hand-card-value">5</span>
                </div>
                <div class="hand-card">
                    <span class="hand-card-suit">♦</span>
                    <span class="hand-card-value">4</span>
                </div>
                <div class="hand-card">
                    <span class="hand-card-suit">♣</span>
                    <span class="hand-card-value">3</span>
                </div>
                <div class="hand-card joker">
                    <span class="hand-card-suit">🃏</span>
                    <span class="hand-card-value">JOKER</span>
                </div>
            </div>
        </section>

        <!-- Controls -->
        <footer id="controls">
            <div class="control-group">
                <button class="control-btn control-btn-icon" id="settings-btn" title="设置">⚙️</button>
                <button class="control-btn control-btn-icon" id="sound-btn" title="音效">🔊</button>
            </div>
            <button class="control-btn control-btn-primary" id="play-btn">出牌</button>
            <div class="control-group">
                <button class="control-btn control-btn-icon control-btn-danger" id="exit-btn" title="退出">🚪</button>
            </div>
        </footer>
    </div>

    <!-- Chat Panel -->
    <div class="chat-panel" id="chat-panel">
        <div class="chat-header">
            <span style="color: var(--gold); font-size: 0.9rem;">💬 聊天</span>
            <button class="panel-btn" id="close-chat" style="width: 32px; height: 32px;">✕</button>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="chat-message system">欢迎来到命运塔！</div>
            <div class="chat-message"><strong>对手:</strong> 你好！</div>
            <div class="chat-message"><strong>系统:</strong> 游戏开始</div>
        </div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chat-input" placeholder="输入消息...">
            <button class="chat-send" id="chat-send">➤</button>
        </div>
    </div>

    <!-- Items Panel -->
    <div class="items-panel" id="items-panel">
        <div class="items-grid">
            <button class="item-btn">🔮<span>透视</span></button>
            <button class="item-btn">⚡<span>加速</span></button>
            <button class="item-btn">🛡️<span>护盾</span></button>
            <button class="item-btn">💣<span>炸弹</span></button>
            <button class="item-btn">🔄<span>换牌</span></button>
            <button class="item-btn">💊<span>恢复</span></button>
        </div>
    </div>

    <!-- Exit Confirm Modal -->
    <div class="modal" id="exit-modal">
        <div class="modal-content">
            <h3 class="modal-title">确认退出?</h3>
            <p style="text-align: center; color: var(--text-secondary); font-size: 0.85rem;">退出游戏将视为放弃，可能会受到惩罚。</p>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-secondary" id="cancel-exit">取消</button>
                <button class="modal-btn modal-btn-primary" id="confirm-exit">确认退出</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <h3 class="modal-title">⚙️ 游戏设置</h3>
            <div style="display: flex; flex-direction: column; gap: 16px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 0.85rem;">音效</span>
                    <button class="control-btn control-btn-icon" id="toggle-sound" style="width: 50px;">🔊</button>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 0.85rem;">震动</span>
                    <button class="control-btn control-btn-icon" id="toggle-vibrate" style="width: 50px;">📳</button>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 0.85rem;">动画</span>
                    <button class="control-btn control-btn-icon" id="toggle-anim" style="width: 50px;">✨</button>
                </div>
            </div>
            <div class="modal-actions">
                <button class="modal-btn modal-btn-primary" id="close-settings">确定</button>
            </div>
        </div>
    </div>

    <script>
        // Game State
        const gameState = {
            connected: false,
            timer: 30,
            selectedCard: null,
            soundEnabled: true,
            vibrateEnabled: true,
            animationEnabled: true
        };

        // WebSocket Connection
        let ws = null;
        const wsUrl = 'wss://game.toweroffate.com/ws';

        function connectWebSocket() {
            updateConnectionStatus('connecting');

            // Simulated WebSocket for demo
            setTimeout(() => {
                gameState.connected = true;
                updateConnectionStatus('connected');
            }, 1500);
        }

        function updateConnectionStatus(status) {
            const statusEl = document.getElementById('connection-status');
            const statusText = statusEl.querySelector('.status-text');

            statusEl.className = 'connection-status ' + status;

            const texts = {
                connected: '已连接',
                disconnected: '已断开',
                connecting: '连接中...'
            };
            statusText.textContent = texts[status];
        }

        // Timer
        function startTimer() {
            setInterval(() => {
                if (gameState.timer > 0) {
                    gameState.timer--;
                    document.getElementById('timer').textContent = gameState.timer;

                    if (gameState.timer <= 10) {
                        document.getElementById('timer').style.color = '#ff4444';
                    }
                }
            }, 1000);
        }

        // Card Selection
        document.querySelectorAll('.hand-card').forEach(card => {
            card.addEventListener('click', function() {
                document.querySelectorAll('.hand-card').forEach(c => c.classList.remove('selected'));
                this.classList.add('selected');
                gameState.selectedCard = this;

                if (gameState.vibrateEnabled && navigator.vibrate) {
                    navigator.vibrate(50);
                }
            });
        });

        // Chat Panel
        const chatBtn = document.getElementById('chat-btn');
        const chatPanel = document.getElementById('chat-panel');
        const closeChat = document.getElementById('close-chat');

        chatBtn.addEventListener('click', () => {
            chatPanel.classList.toggle('show');
            document.getElementById('items-panel').classList.remove('show');
        });

        closeChat.addEventListener('click', () => {
            chatPanel.classList.remove('show');
        });

        // Items Panel
        const itemsBtn = document.getElementById('items-btn');
        const itemsPanel = document.getElementById('items-panel');

        itemsBtn.addEventListener('click', () => {
            itemsPanel.classList.toggle('show');
            chatPanel.classList.remove('show');
        });

        // Exit Modal
        const exitBtn = document.getElementById('exit-btn');
        const exitModal = document.getElementById('exit-modal');
        const cancelExit = document.getElementById('cancel-exit');
        const confirmExit = document.getElementById('confirm-exit');

        exitBtn.addEventListener('click', () => {
            exitModal.classList.add('show');
        });

        cancelExit.addEventListener('click', () => {
            exitModal.classList.remove('show');
        });

        confirmExit.addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        // Settings Modal
        const settingsBtn = document.getElementById('settings-btn');
        const settingsModal = document.getElementById('settings-modal');
        const closeSettings = document.getElementById('close-settings');

        settingsBtn.addEventListener('click', () => {
            settingsModal.classList.add('show');
        });

        closeSettings.addEventListener('click', () => {
            settingsModal.classList.remove('show');
        });

        // Close modals on backdrop click
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('show');
                }
            });
        });

        // Play Button
        document.getElementById('play-btn').addEventListener('click', () => {
            if (!gameState.selectedCard) {
                alert('请先选择一张牌');
                return;
            }
            // Play card logic here
            gameState.selectedCard.classList.remove('selected');
            gameState.selectedCard = null;
        });

        // Sound Toggle
        document.getElementById('sound-btn').addEventListener('click', () => {
            gameState.soundEnabled = !gameState.soundEnabled;
            document.getElementById('sound-btn').textContent = gameState.soundEnabled ? '🔊' : '🔇';
        });

        // Touch Gestures for Hand Scroll
        const handScroll = document.getElementById('hand-scroll');
        let isDown = false;
        let startX;
        let scrollLeft;

        handScroll.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - handScroll.offsetLeft;
            scrollLeft = handScroll.scrollLeft;
        });

        handScroll.addEventListener('mouseleave', () => isDown = false);
        handScroll.addEventListener('mouseup', () => isDown = false);
        handScroll.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - handScroll.offsetLeft;
            const walk = (x - startX) * 2;
            handScroll.scrollLeft = scrollLeft - walk;
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            connectWebSocket();
            startTimer();
        });

        // Prevent zoom on double tap
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
    </script>
</body>
</html>
